<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rango Exchange</title>
  <meta name="description" content="Rango Exchange finds and routes cross-chain swaps and bridges from your own wallet.">
  <link rel="canonical" href="https://rango-exchange-page.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F7F4">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Rango Exchange">
  <meta property="og:description" content="Rango Exchange finds and routes cross-chain swaps and bridges from your own wallet.">
  <meta property="og:url" content="https://rango-exchange-page.github.io/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Rango Exchange">
  <meta name="twitter:description" content="Rango Exchange finds and routes cross-chain swaps and bridges from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://rango-exchange-page.github.io/#website",
        "url": "https://rango-exchange-page.github.io/",
        "name": "Rango Exchange"
      },
      {
        "@type": "WebApplication",
        "@id": "https://rango-exchange-page.github.io/#app",
        "name": "Rango Exchange",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://rango-exchange-page.github.io/",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      },
      {
        "@type": "Organization",
        "@id": "https://rango-exchange-page.github.io/#organization",
        "name": "Rango Exchange",
        "url": "https://rango-exchange-page.github.io/"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#" aria-label="Rango Exchange home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Rango Exchange</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
      <a href="https://ethereum.org/bridges/" target="_blank" rel="nofollow noopener noreferrer">Ethereum bridges</a>
      <a href="https://l2beat.com/interop/summary" target="_blank" rel="nofollow noopener noreferrer">L2BEAT</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>Rango Exchange</h1>
    <p class="sub"><strong>Rango Exchange</strong> finds and routes cross-chain swaps and bridges from your own wallet.</p>

    <section class="app-card" aria-label="Cross-chain swap route">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img src="eth.png" width="28" height="28" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img src="usdc.png" width="28" height="28" alt="USDC">
            <span>USDC</span>
          </span>
        </div>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Rango Exchange &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  })();
  </script>
</body>
</html>
