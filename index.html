<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rango Exchange - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Rango Exchange DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://rango-exchange-page.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root {
  --bg: #F7F7F4;
  --bg-soft: #EFEFEC;
  --surface: #FFFFFF;
  --surface-soft: #F4F4F1;
  --ink: #111316;
  --muted: #66707A;
  --faint: #939AA3;
  --line: rgba(17, 19, 22, 0.10);
  --line-strong: rgba(17, 19, 22, 0.16);
  --accent: #2563EB;
  --accent-soft: rgba(37, 99, 235, 0.10);
  --shadow: 0 28px 70px -38px rgba(17, 19, 22, 0.42);
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  min-height: 100dvh;
  height: 100dvh;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% -18%, var(--accent-soft), transparent 42%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

.topbar {
  display: flex;
  align-items: center;
  gap: 18px;
  height: 72px;
  padding: 0 clamp(18px, 4vw, 44px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  font-size: 1rem;
  font-weight: 750;
  white-space: nowrap;
}

.brand img {
  flex: 0 0 auto;
  border-radius: 8px;
  box-shadow: 0 0 0 1px var(--line);
}

.nav {
  display: flex;
  align-items: center;
  gap: 26px;
  margin-left: 8px;
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 520;
}

.nav a:hover {
  color: var(--accent);
}

.spacer {
  flex: 1 1 auto;
}

.ghost {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 16px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.62);
  color: var(--ink);
  font-size: 0.92rem;
  font-weight: 700;
  box-shadow: 0 10px 30px -24px rgba(17, 19, 22, 0.32);
}

.ghost:hover {
  border-color: rgba(37, 99, 235, 0.42);
  color: var(--accent);
}

.stage {
  min-height: 0;
  height: calc(100dvh - 124px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 18px clamp(18px, 4vw, 44px) 10px;
  text-align: center;
}

h1,
p {
  margin: 0;
}

h1 {
  max-width: 11ch;
  font-size: clamp(3rem, 7vw, 5rem);
  line-height: 0.98;
  font-weight: 800;
}

.sub {
  max-width: 53ch;
  margin-top: 18px;
  color: var(--muted);
  font-size: clamp(1rem, 1.55vw, 1.18rem);
}

.sub strong {
  color: var(--ink);
  font-weight: 760;
}

.app-card {
  width: min(590px, 100%);
  margin-top: 34px;
  padding: 20px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.88);
  box-shadow: var(--shadow);
}

.route {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.leg {
  flex: 1 1 0;
  min-width: 0;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface-soft);
  text-align: left;
}

.label {
  display: block;
  color: var(--faint);
  font-size: 0.74rem;
  font-weight: 760;
  text-transform: uppercase;
}

.chip {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
  margin-top: 10px;
  color: var(--ink);
  font-size: 1.12rem;
  font-weight: 800;
}

.chip img {
  width: 28px;
  height: 28px;
  flex: 0 0 auto;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(17, 19, 22, 0.08);
}

.switch {
  align-self: center;
  width: 42px;
  height: 42px;
  flex: 0 0 42px;
  border: 1px solid var(--line-strong);
  border-radius: 50%;
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: color 160ms ease, border-color 160ms ease, transform 160ms ease;
}

.switch:hover {
  color: var(--accent);
  border-color: rgba(37, 99, 235, 0.42);
  transform: translateY(-1px);
}

.switch span {
  font-size: 1.08rem;
  line-height: 1;
}

.primary {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 54px;
  margin-top: 16px;
  border-radius: 8px;
  background: var(--accent);
  color: #FFFFFF;
  font-size: 1.06rem;
  font-weight: 800;
  box-shadow: 0 18px 34px -24px rgba(37, 99, 235, 0.88);
  transition: transform 160ms ease, box-shadow 160ms ease;
}

.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 22px 42px -25px rgba(37, 99, 235, 0.95);
}

.foot {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 18px 14px;
  color: var(--faint);
  font-size: 0.86rem;
}

@media (max-width: 700px) {
  .topbar {
    height: 64px;
    gap: 12px;
    padding: 0 16px;
  }

  .brand span {
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav {
    display: none;
  }

  .ghost {
    min-height: 36px;
    padding: 0 13px;
    font-size: 0.88rem;
  }

  .stage {
    height: calc(100dvh - 110px);
    padding: 10px 16px 6px;
  }

  h1 {
    max-width: 9ch;
    font-size: clamp(2.62rem, 13vw, 3.4rem);
  }

  .sub {
    max-width: 31ch;
    margin-top: 14px;
    font-size: 0.98rem;
    line-height: 1.45;
  }

  .app-card {
    margin-top: 22px;
    padding: 14px;
  }

  .route {
    flex-direction: column;
    gap: 10px;
  }

  .leg {
    padding: 12px;
  }

  .chip {
    margin-top: 8px;
    font-size: 1.02rem;
  }

  .switch {
    width: 38px;
    height: 38px;
    flex-basis: 38px;
    margin: -2px 0;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .primary {
    min-height: 50px;
    margin-top: 14px;
  }

  .foot {
    height: 46px;
    padding-bottom: 12px;
  }
}

@media (max-width: 390px) {
  .brand {
    gap: 8px;
    font-size: 0.94rem;
  }

  .brand span {
    max-width: 126px;
  }

  .ghost {
    padding: 0 11px;
  }

  .stage {
    padding-left: 14px;
    padding-right: 14px;
  }

  .sub {
    max-width: 29ch;
  }
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Rango Exchange</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Rango Exchange</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Rango Exchange &mdash; 2026</footer>
</body>
</html>
